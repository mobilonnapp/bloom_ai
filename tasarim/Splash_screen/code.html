<!DOCTYPE html><html class="dark" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
<title>Neon Cyberpunk Loading Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#FF2E97", // Neon Pink
                        secondary: "#00F0FF", // Neon Cyan
                        "background-light": "#F8FAFC",
                        "background-dark": "#0A0B1A",
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "12px",
                    },
                    animation: {
                        'spin-slow': 'spin 3s linear infinite',
                        'pulse-glow': 'pulse-glow 2s ease-in-out infinite',
                        'float-up': 'float-up 4s ease-in infinite',
                    },
                    keyframes: {
                        'pulse-glow': {
                            '0%, 100%': { opacity: 1, textShadow: '0 0 10px rgba(255, 46, 151, 0.8)' },
                            '50%': { opacity: 0.8, textShadow: '0 0 20px rgba(255, 46, 151, 1)' },
                        },
                        'float-up': {
                            '0%': { transform: 'translateY(100vh) rotate(0deg)', opacity: 0 },
                            '20%': { opacity: 0.6 },
                            '80%': { opacity: 0.6 },
                            '100%': { transform: 'translateY(-10vh) rotate(360deg)', opacity: 0 },
                        }
                    }
                },
            },
        };
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .neon-border {
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4), inset 0 0 15px rgba(255, 46, 151, 0.4);
        }
        .conic-gradient {
            background: conic-gradient(from 0deg, #00F0FF, #FF2E97, #00F0FF);
        }
        .blur-bg {
            background: radial-gradient(circle at top right, rgba(255, 46, 151, 0.15), transparent 50%),
                        radial-gradient(circle at bottom left, rgba(0, 240, 255, 0.15), transparent 50%);
        }
        .particle {
            position: absolute;
            bottom: -20px;
            color: #00F0FF;
            filter: drop-shadow(0 0 5px #00F0FF);
            pointer-events: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark h-screen w-full flex flex-col items-center justify-center relative overflow-hidden">
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute inset-0 blur-bg"></div>
<div class="absolute -top-1/4 -right-1/4 w-[150%] h-[150%] opacity-20 dark:opacity-30">
<svg class="w-full h-full animate-spin-slow" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
<path d="M500,500 C600,300 800,400 900,200 S700,0 500,0 S100,0 100,200 S400,700 500,500" fill="none" stroke="url(#paint0_linear)" stroke-linecap="round" stroke-width="100"></path>
<defs>
<linearGradient gradientUnits="userSpaceOnUse" id="paint0_linear" x1="0" x2="1000" y1="0" y2="1000">
<stop stop-color="#FF2E97"></stop>
<stop offset="1" stop-color="#00F0FF"></stop>
</linearGradient>
</defs>
</svg>
</div>
</div>
<div class="absolute inset-0 z-10 pointer-events-none">
<span class="material-icons particle animate-float-up text-xs" style="left: 10%;">diamond</span>
<span class="material-icons particle animate-float-up text-sm" style="left: 25%;">diamond</span>
<span class="material-icons particle animate-float-up text-xs" style="left: 45%;">diamond</span>
<span class="material-icons particle animate-float-up text-md" style="left: 65%;">diamond</span>
<span class="material-icons particle animate-float-up text-xs" style="left: 85%;">diamond</span>
<span class="material-icons particle animate-float-up text-sm" style="left: 15%;">diamond</span>
</div>
<main class="relative z-20 flex flex-col items-center justify-center w-full px-8">
<div class="relative w-48 h-48 flex items-center justify-center">
<div class="absolute inset-0 rounded-full conic-gradient animate-spin-slow p-1">
<div class="w-full h-full bg-background-light dark:bg-background-dark rounded-full"></div>
</div>
<div class="absolute inset-0 rounded-full blur-xl opacity-40 bg-gradient-to-tr from-secondary to-primary animate-pulse"></div>
<div class="relative flex flex-col items-center justify-center">
<span class="text-5xl font-bold text-gray-900 dark:text-white tracking-tighter" style="">64<span class="text-2xl font-medium" style="">%</span></span>
</div>
</div>
<div class="mt-12 flex flex-col items-center">
<h1 class="text-xl font-medium text-gray-800 dark:text-white animate-pulse-glow tracking-wide" style="">
                LOADING</h1>
<p class="mt-2 text-sm text-gray-500 dark:text-gray-400 font-light" style="">
                Applying AI effects to your video
            </p>
</div>
</main>
<footer class="absolute bottom-12 z-20 w-full flex justify-center px-8">
<button class="px-8 py-3 text-sm font-medium text-gray-400 hover:text-gray-600 dark:text-gray-500 dark:hover:text-white transition-colors duration-300" style=""><br></button>
</footer>
<div class="absolute top-0 w-full px-6 py-4 flex justify-between items-center z-30 pointer-events-none opacity-60">
<span class="text-sm font-semibold dark:text-white" style="">03:08</span>
<div class="flex items-center space-x-2">
<span class="material-icons text-sm dark:text-white" style="">signal_cellular_alt</span>
<span class="material-icons text-sm dark:text-white" style="">wifi</span>
<span class="material-icons text-sm dark:text-white" style="">battery_full</span>
</div>
</div>

</body></html>
